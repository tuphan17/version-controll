server.port=8080
spring.application.name=hub

spring.datasource.url=jdbc:h2:file:./data/hub;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# each uuid folder under here is a repo
tabularhub.repos.root=./data/repos

# tvcs binary — leave default if you want the java fallback
tabularhub.tvcs.executable=tvcs
# auto = try native first | embedded | native
tabularhub.tvcs.mode=auto
