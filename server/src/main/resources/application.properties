server.port=8080
spring.application.name=tabular-hub

# Catalog (repo list, paths)
spring.datasource.url=jdbc:h2:file:./data/hub;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Where repos live on disk (each subfolder is a tvcs repo)
tabularhub.repos.root=./data/repos

# Path to tvcs executable (override per OS). If missing and mode=auto, pure Java engine is used.
tabularhub.tvcs.executable=tvcs
# auto | native | embedded
tabularhub.tvcs.mode=auto
